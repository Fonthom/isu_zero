services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: isu_zero
      POSTGRES_USER: isu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infra/seed_dev.sql:/docker-entrypoint-initdb.d/02_seed_dev.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isu -d isu_zero"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222"]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://isu:${POSTGRES_PASSWORD}@postgres:5432/isu_zero?sslmode=disable
      NATS_URL: nats://nats:4222
      PORT: 8080
      UI_DIR: /ui
    volumes:
      - photo_store:/photos
      - ./ui:/ui:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  cropper:
    build: ./cropper
    environment:
      DATABASE_URL: postgres://isu:${POSTGRES_PASSWORD}@postgres:5432/isu_zero?sslmode=disable
      NATS_URL: nats://nats:4222
      PHOTO_DIR: /photos
      CROP_DIR: /photos/crops
    volumes:
      - photo_store:/photos
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  postgres_data:
  photo_store: