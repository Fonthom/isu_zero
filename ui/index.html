<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ISU-Zero — Item Search Unit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <header class="site-header">
      <div class="logo">ISU<span>-0</span></div>
      <div class="status-pill">
        <div class="status-dot"></div>
        SYSTEM ONLINE
      </div>
    </header>

    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="q" placeholder="What are you looking for?" autofocus autocomplete="off" />
      </div>
      <button id="searchBtn">SEARCH →</button>
    </div>

    <div id="status" class="status">Type a query and press Search</div>

    <ul id="results" class="results"></ul>

    <div id="detail" class="detail hidden">
      <h2 id="detail-name"></h2>
      <p><strong>Coordinates</strong> <span id="detail-coords"></span></p>
      <p><strong>Waypoint</strong> <span id="detail-waypoint"></span></p>
      <div class="actions">
        <button id="requestBtn">REQUEST ROBOT →</button>
        <button id="backBtn">← BACK</button>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
